name: 'StackQL OIDC Cloud Audit'
description: 'Org-wide enumerated audits — S3 full scan, AWS region sweep, GCP org descent, Azure management-group descent. Runs scripts/discover.py; the shallow root action is unaffected.'
author: 'StackQL'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  target:
    description: 'Space-separated deep targets: s3 aws-regions gcp-org azure-org entra'
    required: false
    default: 's3 aws-regions gcp-org azure-org entra'

  # --- GCP (gcp-org) ---
  gcp-workload-identity-provider:
    description: 'GCP workload identity provider.'
    required: false
    default: ''
  gcp-sa-email:
    description: 'GCP service account email.'
    required: false
    default: ''
  google-org-id:
    description: 'GCP organization ID, digits only.'
    required: false
    default: ''
  google-provider-version:
    description: 'stackql Google provider version (blank = latest).'
    required: false
    default: 'v25.12.00357'

  # --- AWS (s3, aws-regions) ---
  aws-role-arn:
    description: 'AWS role ARN to assume. Pass via a workflow secret.'
    required: false
    default: ''
  aws-region:
    description: 'AWS region — S3 endpoint + region-sweep seed.'
    required: false
    default: ''
  aws-provider-version:
    description: 'stackql AWS provider version (blank = latest).'
    required: false
    default: 'v26.05.00395'

  # --- Azure (azure-org) ---
  azure-tenant-id:
    description: 'Azure AD tenant ID (service-principal auth).'
    required: false
    default: ''
  azure-client-id:
    description: 'Azure AD application (client) ID.'
    required: false
    default: ''
  azure-subscription-id:
    description: 'Azure subscription ID.'
    required: false
    default: ''
  azure-client-secret:
    description: 'Azure AD client secret. Pass via a workflow secret.'
    required: false
    default: ''
  azure-mgmt-group:
    description: 'Azure management group ID (blank = all tenant subscriptions).'
    required: false
    default: ''
  azure-provider-version:
    description: 'stackql Azure provider version (blank = latest).'
    required: false
    default: 'v24.10.00267'
  # entra (entra_id) rides on the federated Azure login above; no extra credentials.
  entra-id-provider-version:
    description: 'stackql entra_id provider version (blank = v26.06.00405).'
    required: false
    default: 'v26.06.00405'

  # --- Budget (deep only; -1 = unlimited) ---
  max-nodes:
    description: 'Max org-nodes visited (regions/projects/subscriptions/buckets).'
    required: false
    default: '-1'
  max-queries:
    description: 'Max stackql queries issued.'
    required: false
    default: '-1'
  timeout-seconds:
    description: 'Overall wall-clock budget in seconds.'
    required: false
    default: '-1'
  parallel:
    description: 'Concurrent workers per target.'
    required: false
    default: '8'

  # --- Common ---
  fail-on-severity:
    description: 'Severity threshold discover.py annotates findings at (the action itself does not gate the run).'
    required: false
    default: 'HIGH'
  stackql-version:
    description: 'stackql release to install (e.g. "v0.5.745") or "latest".'
    required: false
    default: 'latest'
  upload-logs:
    description: 'Upload per-invocation logs + *-findings.jsonl as the deep-audit-logs artifact.'
    required: false
    default: 'true'
  log-retention-days:
    description: 'Retention (days) for the logs artifact (0 = repo default).'
    required: false
    default: '0'

runs:
  using: 'composite'
  steps:
    - name: Install stackql
      shell: bash
      env:
        STACKQL_VERSION: ${{ inputs.stackql-version }}
      run: |
        set -euo pipefail
        cd "${RUNNER_TEMP}"
        if [ "${STACKQL_VERSION}" = "latest" ]; then
          url="https://releases.stackql.io/stackql/latest/stackql_linux_amd64.zip"
        else
          url="https://releases.stackql.io/stackql/${STACKQL_VERSION}/stackql_linux_amd64.zip"
        fi
        curl -fsSL "$url" -o stackql.zip
        unzip -q stackql.zip && chmod +x stackql
        echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"


    - name: ID Fed - configure AWS credentials (OIDC)
      id: aws_auth
      if: inputs.aws-role-arn != ''
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: us-east-1

    - name: ID Fed - authenticate to Google Cloud (OIDC)
      id: gcp_auth
      if: inputs.gcp-workload-identity-provider != '' && inputs.gcp-sa-email != ''
      continue-on-error: true
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-sa-email }}
        token_format: 'access_token'

    - name: ID Fed - login to Azure (OIDC)
      id: azure_auth
      # Subscription is opt-in: azure-org without one enumerates all subscriptions,
      # and entra (tenant-global Graph) needs none. Login only requires client+tenant.
      if: inputs.azure-client-id != '' && inputs.azure-tenant-id != ''
      continue-on-error: true
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}
        allow-no-subscriptions: true

    - name: Pull stackql providers
      shell: bash
      env:
        GOOGLE_VER: ${{ inputs.google-provider-version }}
        AWS_VER: ${{ inputs.aws-provider-version }}
        AZURE_VER: ${{ inputs.azure-provider-version }}
        ENTRA_VER: ${{ inputs.entra-id-provider-version }}
        AWS_AUTH_OK: ${{ steps.aws_auth.outcome == 'success' }}
        GCP_AUTH_OK: ${{ steps.gcp_auth.outcome == 'success' }}
        AZURE_AUTH_OK: ${{ steps.azure_auth.outcome == 'success' }}
      run: |
        set -euo pipefail
        pull() { local p="$1" v="$2"; if [ -n "$v" ]; then stackql exec "registry pull $p $v;"; else stackql exec "registry pull $p;"; fi; }
        [ "$AWS_AUTH_OK" = "true" ]   && pull aws    "$AWS_VER"
        [ "$GCP_AUTH_OK" = "true" ]   && pull google "$GOOGLE_VER"
        [ "$AZURE_AUTH_OK" = "true" ] && pull azure  "$AZURE_VER"
        [ "$AZURE_AUTH_OK" = "true" ] && pull entra_id "$ENTRA_VER"
        true

    - name: Run deep audits
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        GOOGLE_ORG_ID: ${{ inputs.google-org-id }}
        AZURE_TENANT_ID: ${{ inputs.azure-tenant-id }}
        AZURE_CLIENT_ID: ${{ inputs.azure-client-id }}
        AZURE_MGMT_GROUP: ${{ inputs.azure-mgmt-group }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        STACKQL_DEEP_MAX_NODES: ${{ inputs.max-nodes }}
        STACKQL_DEEP_MAX_QUERIES: ${{ inputs.max-queries }}
        STACKQL_DEEP_TIMEOUT: ${{ inputs.timeout-seconds }}
        STACKQL_S3_PARALLEL: ${{ inputs.parallel }}
        STACKQL_AWS_PARALLEL: ${{ inputs.parallel }}
        STACKQL_GCP_PARALLEL: ${{ inputs.parallel }}
        STACKQL_AZURE_PARALLEL: ${{ inputs.parallel }}
        STACKQL_AUDIT_LOG_DIR: ${{ github.workspace }}/deep-audit-log
        TARGETS: ${{ inputs.target }}
        AWS_AUTH_OK: ${{ steps.aws_auth.outcome == 'success' }}
        GCP_AUTH_OK: ${{ steps.gcp_auth.outcome == 'success' }}
        AZURE_AUTH_OK: ${{ steps.azure_auth.outcome == 'success' }}
        AWS_AUTH_OUTCOME: ${{ steps.aws_auth.outcome }}
        GCP_AUTH_OUTCOME: ${{ steps.gcp_auth.outcome }}
        AZURE_AUTH_OUTCOME: ${{ steps.azure_auth.outcome }}
        GCP_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}
      run: |
        set -uo pipefail
        ACTION_PATH="$(cd "${{ github.action_path }}/../.." && pwd)"   # repo root (actions/oidc/ is two subdirs)
        export ACTION_PATH
        export RUN_STAMP="$(date +%s)"
        # Surface each federated-login step's result (success/failure/skipped) — the
        # auth steps are continue-on-error, so without this a failed login is silent
        # and the only symptom is a provider missing from the list below.
        echo "::notice::ID-fed login outcomes — aws=${AWS_AUTH_OUTCOME:-?} gcp=${GCP_AUTH_OUTCOME:-?} azure=${AZURE_AUTH_OUTCOME:-?}"
        [ "$AZURE_AUTH_OK" != "true" ] && echo "::warning::Azure federated login did not succeed (outcome=${AZURE_AUTH_OUTCOME:-?}) — azure + entra_id excluded. Open the 'ID Fed - login to Azure (OIDC)' step to see the error (usually a federated-credential subject mismatch)."
        providers=""
        [ "$AWS_AUTH_OK" = "true" ]   && providers="$providers aws"
        [ "$GCP_AUTH_OK" = "true" ]   && providers="$providers google"
        [ "$AZURE_AUTH_OK" = "true" ] && providers="$providers azure entra_id"
        export STACKQL_AUDIT_PROVIDERS="${providers# }"
        # Bridge each federated session to stackql as a bearer token — no secrets.
        # azure and entra_id use the SAME flow: a token from the az CLI session
        # azure/login established, differing only by audience (ARM vs Graph).
        auth=()
        [ "$GCP_AUTH_OK" = "true" ] && auth+=('"google":{"type":"bearer","credentialsenvvar":"GCP_ACCESS_TOKEN"}')
        if [ "$AZURE_AUTH_OK" = "true" ]; then
          export AZURE_ARM_TOKEN="$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)"
          export AZURE_GRAPH_TOKEN="$(az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)"
          auth+=('"azure":{"type":"bearer","credentialsenvvar":"AZURE_ARM_TOKEN"}')
          auth+=('"entra_id":{"type":"bearer","credentialsenvvar":"AZURE_GRAPH_TOKEN"}')
        fi
        if [ "${#auth[@]}" -gt 0 ]; then
          IFS=','; export STACKQL_AUDIT_AUTH="{${auth[*]}}"; unset IFS
        fi
        echo "::notice::authenticated providers: ${STACKQL_AUDIT_PROVIDERS:-(none)}"
        python3 -m pip install --quiet -r "${ACTION_PATH}/cicd/requirements.txt"
        for t in $TARGETS; do
          echo "::group::deep: $t"
          python3 "${ACTION_PATH}/scripts/discover.py" "$t" || echo "::warning::deep target '$t' exited non-zero"
          echo "::endgroup::"
        done

    - name: Upload logs + findings
      if: ${{ always() && inputs.upload-logs == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: deep-audit-logs
        path: ${{ github.workspace }}/deep-audit-log/
        if-no-files-found: ignore
        retention-days: ${{ inputs.log-retention-days }}
