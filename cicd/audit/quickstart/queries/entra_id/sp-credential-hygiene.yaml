id: entra-sp-credential-hygiene
name: Service principals with expired or long-lived credentials
severity: HIGH
description: |
  Service principals (enterprise apps) whose password or key credentials are
  expired, expiring within 30 days, or valid for longer than a year. Service
  principal secrets are a common lateral-movement and persistence vector.
remediation: |
  Rotate the credential and remove the stale one via the service principal's
  add_password / add_key then remove_password / remove_key operations. Prefer
  certificate credentials and short lifetimes; remove principals no longer in use.
query: |
  SELECT appId, displayName, servicePrincipalType, passwordCredentials, keyCredentials
  FROM entra_id.service_principals.service_principals
filter: entra_credential_hygiene
filter_args:
  expiry_window_days: 30
  max_lifetime_days: 365
columns: [displayName, appId, servicePrincipalType, credential_issues]
