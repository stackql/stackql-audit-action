id: aws-finops-cluster-watch
name: EKS clusters (watch)
severity: LOW
description: EKS cluster control planes flagged for cost review (category=watch). Node cost is covered by compute watch.
remediation: Confirm the cluster is needed; consolidate where possible.
query: |
  SELECT id, arn, region, version
  FROM aws.eks.clusters
  WHERE region = '${AWS_REGION}'
filter: aws_eks_watch
columns: [resource, type, region, monthly_run_rate_usd]
