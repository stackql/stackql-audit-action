# Copy this into .github/workflows/azure-audit.yml in your repo.
#
# Setup:
#   1. Create a service principal with read-only audit permissions on the
#      subscription, then add repo secrets:
#        AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   2. Trigger via the Actions tab → "Azure Audit" → Run workflow, entering the
#      subscription ID.
#
# Pin the action to a tag or commit SHA for reproducibility, e.g.
#   uses: stackql/stackql-audit-action@v0.1

name: Azure Audit

on:
  workflow_dispatch:
    inputs:
      subscription-id:
        description: Azure subscription ID to audit
        required: true
      fail-on-severity:
        description: Severity threshold to fail on (CRITICAL/HIGH/MEDIUM/LOW/NONE)
        required: false
        default: HIGH
      upload-logs:
        description: Upload per-invocation stackql logs as an artifact (for debugging)
        required: false
        default: 'false'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: stackql/stackql-audit-action@v0.1
        with:
          azure-subscription-id: ${{ inputs.subscription-id }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          fail-on-severity: ${{ inputs.fail-on-severity }}
          upload-logs: ${{ inputs.upload-logs }}
          # Retention for the logs artifact, in days. 0 = repository default; max 90.
          log-retention-days: '7'
