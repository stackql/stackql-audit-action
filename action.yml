name: 'StackQL Cloud Audit'
description: 'Audit GCP, AWS, and Azure live with SQL — public firewalls, public IPs, weak storage/SQL configs, and more. No agents, no pipelines. A provider runs only when its credentials are supplied.'
author: 'StackQL'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  # --- GCP ---
  gcp-project-id:
    description: 'GCP project ID to audit (substituted as ${PROJECT_ID} in google checks).'
    required: false
    default: ''
  gcp-credentials:
    description: 'Full contents of a GCP service account JSON key. Pass via a workflow secret, e.g. secrets.GCP_SA_JSON.'
    required: false
    default: ''
  google-provider-version:
    description: 'Version of the Google provider to pull (blank = v25.12.00357).'
    required: false
    default: 'v25.12.00357'

  # --- AWS ---
  aws-access-key-id:
    description: 'AWS access key ID.'
    required: false
    default: ''
  aws-secret-access-key:
    description: 'AWS secret access key. Pass via a workflow secret.'
    required: false
    default: ''
  aws-region:
    description: 'AWS region to audit (substituted as ${AWS_REGION} in aws checks).'
    required: false
    default: ''
  aws-provider-version:
    description: 'Version of the AWS provider to pull (blank = v26.05.00395).'
    required: false
    default: 'v26.05.00395'

  # --- Azure ---
  azure-subscription-id:
    description: 'Azure subscription ID to audit (substituted as ${SUBSCRIPTION_ID} in azure checks).'
    required: false
    default: ''
  azure-tenant-id:
    description: 'Azure AD tenant ID (for service-principal auth).'
    required: false
    default: ''
  azure-client-id:
    description: 'Azure AD application (client) ID.'
    required: false
    default: ''
  azure-client-secret:
    description: 'Azure AD client secret. Pass via a workflow secret.'
    required: false
    default: ''
  azure-provider-version:
    description: 'Version of the Azure provider to pull (blank = v24.10.00267).'
    required: false
    default: 'v24.10.00267'
  # entra_id reuses the Azure service principal above (no extra credentials);
  # it runs whenever Azure does.
  entra-id-provider-version:
    description: 'Version of the entra_id provider to pull (blank = v26.06.00405).'
    required: false
    default: 'v26.06.00405'

  # --- Common ---
  queries-path:
    description: 'Path to a custom queries directory (must contain per-provider subdirs: google/ aws/ azure/).'
    required: false
    default: ''
  fail-on-severity:
    description: 'Fail the workflow if any finding is at or above this severity (CRITICAL, HIGH, MEDIUM, LOW). Use NONE to never fail.'
    required: false
    default: 'HIGH'
  stackql-version:
    description: 'stackql release to install (e.g. "v0.5.745") or "latest"'
    required: false
    default: 'latest'
  upload-logs:
    description: 'Upload the per-invocation .log files (stackql-audit-logs) and the per-provider JSONL data streams (stackql-audit-data-streams) as workflow artifacts. Useful for debugging empty/odd results.'
    required: false
    default: 'false'
  merge-data-streams:
    description: 'Merge all *-findings.jsonl into one summary.json (keyed by provider) at the end. Blank = on whenever upload-logs is true; set "true"/"false" to force.'
    required: false
    default: ''
  log-retention-days:
    description: 'Retention in days for the uploaded artifacts (0 = repository default). Integer in [0, 90]. Only used when upload-logs is true.'
    required: false
    default: '0'

outputs:
  findings-count:
    description: 'Total findings across all checks'
    value: ${{ steps.audit.outputs.findings-count }}
  highest-severity:
    description: 'Highest severity finding (CRITICAL/HIGH/MEDIUM/LOW/NONE)'
    value: ${{ steps.audit.outputs.highest-severity }}

runs:
  using: 'composite'
  steps:
    - name: Validate log-retention-days
      if: ${{ inputs.upload-logs == 'true' }}
      shell: bash
      env:
        LOG_RETENTION_DAYS: ${{ inputs.log-retention-days }}
      run: |
        set -euo pipefail
        case "$LOG_RETENTION_DAYS" in
          ''|*[!0-9]*)
            echo "::error::log-retention-days must be an integer in [0, 90] (got '${LOG_RETENTION_DAYS}')"
            exit 1 ;;
        esac
        if [ "$LOG_RETENTION_DAYS" -gt 90 ]; then
          echo "::error::log-retention-days must be <= 90 (got '${LOG_RETENTION_DAYS}')"
          exit 1
        fi

    - name: Install stackql
      shell: bash
      env:
        STACKQL_VERSION: ${{ inputs.stackql-version }}
      run: |
        set -euo pipefail
        log="${RUNNER_TEMP}/stackql-install.log"
        cd "${RUNNER_TEMP}"
        if [ "${STACKQL_VERSION}" = "latest" ]; then
          url="https://releases.stackql.io/stackql/latest/stackql_linux_amd64.zip"
        else
          url="https://releases.stackql.io/stackql/${STACKQL_VERSION}/stackql_linux_amd64.zip"
        fi
        {
          curl -fsSL "$url" -o stackql.zip
          unzip -q stackql.zip
          chmod +x stackql
        } 2>&1 | tee "$log"
        echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"
        "${RUNNER_TEMP}/stackql" --version 2>&1 | tee -a "$log" || true

    - name: Pull stackql providers
      shell: bash
      env:
        GCP_CREDS: ${{ inputs.gcp-credentials }}
        AWS_KEY: ${{ inputs.aws-access-key-id }}
        AZURE_SUB: ${{ inputs.azure-subscription-id }}
        GOOGLE_VER: ${{ inputs.google-provider-version }}
        AWS_VER: ${{ inputs.aws-provider-version }}
        AZURE_VER: ${{ inputs.azure-provider-version }}
        ENTRA_VER: ${{ inputs.entra-id-provider-version }}
      run: |
        set -euo pipefail
        log="${RUNNER_TEMP}/stackql-registry-pull.log"
        pull() {
          local provider="$1" version="$2"
          if [ -n "$version" ]; then
            stackql exec "registry pull ${provider} ${version};"
          else
            stackql exec "registry pull ${provider};"
          fi
        }
        {
          [ -n "$GCP_CREDS" ]  && pull google "$GOOGLE_VER"
          [ -n "$AWS_KEY" ]    && pull aws "$AWS_VER"
          [ -n "$AZURE_SUB" ]  && pull azure "$AZURE_VER"
          [ -n "$AZURE_SUB" ]  && pull entra_id "$ENTRA_VER"
          true
        } 2>&1 | tee "$log"

    - name: Write GCP credentials
      if: ${{ inputs.gcp-credentials != '' }}
      shell: bash
      env:
        GCP_SA_JSON: ${{ inputs.gcp-credentials }}
      run: |
        set -euo pipefail
        creds="${RUNNER_TEMP}/gcp-sa.json"
        printf '%s' "$GCP_SA_JSON" > "$creds"
        chmod 600 "$creds"
        echo "STACKQL_AUDIT_GCP_CREDS=$creds" >> "$GITHUB_ENV"

    - name: Run audit
      id: audit
      shell: bash
      env:
        PROJECT_ID: ${{ inputs.gcp-project-id }}
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        AWS_REGION: ${{ inputs.aws-region }}
        AZURE_SUBSCRIPTION_ID: ${{ inputs.azure-subscription-id }}
        AZURE_TENANT_ID: ${{ inputs.azure-tenant-id }}
        AZURE_CLIENT_ID: ${{ inputs.azure-client-id }}
        AZURE_CLIENT_SECRET: ${{ inputs.azure-client-secret }}
        QUERIES_PATH: ${{ inputs.queries-path }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        ACTION_PATH: ${{ github.action_path }}
        STACKQL_AUDIT_LOG_DIR: ${{ github.workspace }}/audit-log
        STACKQL_AUDIT_STREAM_DIR: ${{ github.workspace }}/audit-data-streams
      run: |
        set -euo pipefail
        export RUN_STAMP="$(date +%s)"
        providers=""
        [ -n "${STACKQL_AUDIT_GCP_CREDS:-}" ] && providers="$providers google"
        [ -n "${AWS_ACCESS_KEY_ID:-}" ]       && providers="$providers aws"
        [ -n "${AZURE_SUBSCRIPTION_ID:-}" ]   && providers="$providers azure entra_id"
        export STACKQL_AUDIT_PROVIDERS="${providers# }"
        echo "::notice::providers: ${STACKQL_AUDIT_PROVIDERS:-(none)}"
        python3 -m pip install --quiet -r "${ACTION_PATH}/cicd/requirements.txt"
        python3 "${ACTION_PATH}/scripts/audit.py"
        # hand the run's stream dir to the merge/upload steps
        echo "STACKQL_STREAM_RUN_DIR=${STACKQL_AUDIT_STREAM_DIR}/${RUN_STAMP}" >> "$GITHUB_ENV"

    - name: Merge data streams
      # On by default when uploads are on; force with merge-data-streams true/false.
      if: ${{ always() && (inputs.merge-data-streams == 'true' || (inputs.merge-data-streams == '' && inputs.upload-logs == 'true')) }}
      shell: bash
      run: |
        set -uo pipefail
        python3 "${{ github.action_path }}/scripts/merge_streams.py" \
          "${STACKQL_STREAM_RUN_DIR:-${{ github.workspace }}/audit-data-streams}"

    - name: Upload stackql logs
      # always() so logs upload even when the audit fails on findings (exit 1)
      if: ${{ always() && inputs.upload-logs == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: stackql-audit-logs
        path: ${{ github.workspace }}/audit-log/
        if-no-files-found: ignore
        retention-days: ${{ inputs.log-retention-days }}

    - name: Upload stackql data streams
      if: ${{ always() && inputs.upload-logs == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: stackql-audit-data-streams
        path: ${{ github.workspace }}/audit-data-streams/
        if-no-files-found: ignore
        retention-days: ${{ inputs.log-retention-days }}
