id: aws-sg-ssh-open
name: SSH (22/tcp) open to the internet
severity: HIGH
description: |
  Security-group ingress rules allowing tcp/22 from 0.0.0.0/0. Public SSH is a
  primary vector for brute-force credential attacks.
remediation: |
  Restrict the rule's source ranges to known CIDRs, or front instances with SSM Session Manager.
query: |
  SELECT groupId, groupName, vpcId, ipPermissions
  FROM aws.ec2_native.security_groups
  WHERE region = '${AWS_REGION}'
filter: sg_allows_port
filter_args:
  port: 22
  protocol: tcp
columns: [groupId, groupName, vpcId]
