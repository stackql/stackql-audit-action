id: aws-default-vpc
name: Default VPC exists
severity: LOW
description: |
  The default VPC ships with a permissive default security group and a public
  subnet per AZ. Many orgs prefer to delete it so resources can't land there by
  accident.
remediation: |
  Delete the default VPC in regions you don't use, and deploy into purpose-built
  VPCs with explicit subnet/SG design.
query: |
  SELECT vpc_id, cidr_block, is_default
  FROM aws.ec2.vpcs
  WHERE region = '${AWS_REGION}'
    AND is_default = true
columns: [vpc_id, cidr_block]
