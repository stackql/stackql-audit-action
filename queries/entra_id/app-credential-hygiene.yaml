id: entra-app-credential-hygiene
name: App registrations with expired or long-lived credentials
severity: HIGH
description: |
  Application registrations whose password (client secret) or key (certificate)
  credentials are expired, expiring within 30 days, or valid for longer than a
  year. Expired credentials left in place are dead weight; long-lived secrets
  widen the blast radius if leaked.
remediation: |
  Rotate the credential and remove the stale one — add a fresh secret/cert via
  entra_id.applications.applications add_password / add_key, then delete the old
  one with remove_password / remove_key. Prefer certificates and short lifetimes.
query: |
  SELECT appId, displayName, passwordCredentials, keyCredentials
  FROM entra_id.applications.applications
filter: entra_credential_hygiene
filter_args:
  expiry_window_days: 30
  max_lifetime_days: 365
columns: [displayName, appId, credential_issues]
