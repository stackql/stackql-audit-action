id: azure-finops-unassociated-ip
name: Unassociated public IP addresses
severity: LOW
description: |
  Public IPs not bound to any IP configuration (idle) — still billed hourly.
remediation: |
  Release with DELETE FROM azure.network.public_ip_addresses if unused.
query: |
  SELECT id, name, location, properties
  FROM azure.network.public_ip_addresses
  WHERE subscriptionId = '${SUBSCRIPTION_ID}'
filter: azure_unassociated_public_ip
columns: [name, region, estimated_monthly_usd]
suggested_remediation:
  type: delete
  tool: stackql
  preflight_query: |
    SELECT name FROM azure.network.public_ip_addresses WHERE subscriptionId = '${subscriptionId}' AND resourceGroupName = '${resourceGroupName}' AND publicIpAddressName = '${name}'
  description: Release the unassociated public IP address.
  sql_query: |
    DELETE FROM azure.network.public_ip_addresses
    WHERE subscriptionId = '${subscriptionId}' AND resourceGroupName = '${resourceGroupName}' AND publicIpAddressName = '${name}'
