id: gcp-finops-unused-ip
name: Reserved static IPs not in use
severity: LOW
description: |
  Static external IPs reserved but not attached (status RESERVED, no users).
  Reserved-and-idle IPs are billed hourly.
remediation: |
  Release with DELETE FROM google.compute.addresses if no longer needed.
query: |
  SELECT name, address, status, region, users
  FROM google.compute.addresses
  WHERE project = '${PROJECT_ID}'
filter: gcp_unused_address
columns: [name, address, region, estimated_monthly_usd]
suggested_remediation:
  type: delete
  description: Release the reserved static IP that is not in use.
  sql_query: |
    DELETE FROM google.compute.addresses
    WHERE project = '${project}' AND region = '${region}' AND address = '${name}'
